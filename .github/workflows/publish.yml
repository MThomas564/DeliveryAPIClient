name: Publish to NuGet

on:
  release:
    types: [ published ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack src/DeliveryAPIClient/DeliveryAPIClient.csproj --configuration Release --output ./nupkg -p:PackageVersion=${{ steps.version.outputs.value }}

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload nupkg to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
