<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Umbraco Delivery API — Examples</title>
    <base href="/" />
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; gap: 1.5rem; }
        nav a { color: #eee; text-decoration: none; }
        nav a:hover { color: #fff; text-decoration: underline; }
        main { padding: 2rem; max-width: 900px; }
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
        .card img { max-width: 100%; border-radius: 4px; }
        .tag { background: #eee; border-radius: 3px; padding: 2px 6px; font-size: 0.8em; margin-right: 4px; }
        .error { color: #c0392b; background: #fdf0ef; border: 1px solid #e74c3c; border-radius: 4px; padding: 1rem; }
        .muted { color: #888; font-size: 0.9em; }
        input, select { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; margin-right: 0.5rem; }
        button { padding: 0.4rem 0.9rem; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #2d2d50; }
        #blazor-error-ui { display: none; background: #c0392b; color: #fff; padding: 1rem; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <div id="app">Loading...</div>
    <div id="blazor-error-ui">
        An unhandled error has occurred. <a href="" class="reload">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
